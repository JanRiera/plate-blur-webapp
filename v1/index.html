<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Blur Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="app-header">
      <div class="app-topbar">
        <h1 data-i18n="appTitle">Plate Blur Prototype</h1>
        <div class="preferences-panel">
          <div class="setting-group">
            <span class="setting-label" data-i18n="theme">Theme</span>
            <button id="themeToggleBtn" class="theme-toggle" type="button" aria-pressed="false">
              <span class="theme-toggle-icons" aria-hidden="true">
                <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="4.5"></circle>
                  <path d="M12 2.5v2.5"></path>
                  <path d="M12 19v2.5"></path>
                  <path d="M4.9 4.9l1.8 1.8"></path>
                  <path d="M17.3 17.3l1.8 1.8"></path>
                  <path d="M2.5 12H5"></path>
                  <path d="M19 12h2.5"></path>
                  <path d="M4.9 19.1l1.8-1.8"></path>
                  <path d="M17.3 6.7l1.8-1.8"></path>
                </svg>
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20.5 14.2A8.8 8.8 0 0 1 9.8 3.5a9 9 0 1 0 10.7 10.7Z"></path>
                </svg>
              </span>
              <span class="theme-toggle-text" id="themeToggleText">Light</span>
            </button>
          </div>
          <div class="setting-group">
            <label class="setting-label" for="languageSelect" data-i18n="language">Language</label>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="ja">Japanese</option>
              <option value="es">Spanish</option>
              <option value="it">Italian</option>
              <option value="de">German</option>
            </select>
          </div>
        </div>
      </div>
      <p class="status-banner" id="status" aria-live="polite" data-tone="info" data-i18n="statusSelectPhoto">Select a photo to begin.</p>
    </header>

    <section class="photo-bar">
      <div class="photo-bar-actions">
        <label class="file-picker" for="photoInput">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16V6"></path>
              <path d="m7.5 10.5 4.5-4.5 4.5 4.5"></path>
              <path d="M4 18.5h16"></path>
            </svg>
          </span>
          <span data-i18n="uploadPhotos">Choose Photos</span>
        </label>
        <input id="photoInput" class="visually-hidden" type="file" accept="image/*" multiple />
        <button id="removePhotoBtn" class="icon-button danger-button" type="button" disabled>
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4.5 7.5h15"></path>
              <path d="M9.5 7.5V5.5h5v2"></path>
              <path d="M8 7.5v10.5"></path>
              <path d="M12 7.5v10.5"></path>
              <path d="M16 7.5v10.5"></path>
              <path d="M6 7.5l1 12h10l1-12"></path>
            </svg>
          </span>
          <span data-i18n="removePhoto">Remove Photo</span>
        </button>
      </div>
      <div class="photo-bar-summary">
        <span class="photo-bar-label" data-i18n="groupPhotos">Photos</span>
        <span class="photo-bar-text" id="photoSelectionSummary" data-i18n="photoSelectionEmpty">No photos selected.</span>
      </div>
    </section>

    <div class="stage">
      <div class="canvas-panel">
        <button id="prevBtn" class="canvas-nav canvas-nav-prev" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m14.5 5.5-7 6.5 7 6.5"></path>
          </svg>
          <span class="visually-hidden" data-i18n="previous">Previous</span>
        </button>
        <button id="nextBtn" class="canvas-nav canvas-nav-next" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m9.5 5.5 7 6.5-7 6.5"></path>
          </svg>
          <span class="visually-hidden" data-i18n="next">Next</span>
        </button>
        <div class="canvas-meta">
          <span class="canvas-badge" id="photoPositionBadge" hidden></span>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="editorCanvas" width="800" height="500"></canvas>
        </div>
      </div>

      <div class="side-panel">
        <section class="tool-section">
          <h2 data-i18n="adjustments">Adjustments</h2>
          <div class="field">
            <label for="redactionMode" data-i18n="mode">Mode</label>
            <select id="redactionMode" disabled>
              <option value="blur" data-i18n="modeBlur">Blur</option>
              <option value="amg" data-i18n="modeAmg">AMG Overlay</option>
            </select>
          </div>
          <div class="field">
            <label for="blurSlider" data-i18n="blurStrength">Blur strength</label>
            <input id="blurSlider" type="range" min="4" max="40" step="1" value="16" disabled />
          </div>
          <div class="field">
            <label for="zoomSlider" data-i18n="zoom">Zoom</label>
            <input id="zoomSlider" type="range" min="25" max="200" step="5" value="100" disabled />
          </div>
          <div class="field muted" data-i18n="helpDragResize">Drag inside a box to move it. Drag a corner handle to resize it.</div>
          <div class="field muted" data-i18n="helpReviewDetect">Auto-detect is only a rough prototype. Review every box before saving.</div>
        </section>

        <section class="tool-section">
          <h2 data-i18n="groupDetection">Detection</h2>
          <div class="tool-actions">
            <button id="autoDetectBtn" type="button" disabled data-i18n="autoDetect">Auto Detect</button>
            <button id="autoDetectAllBtn" type="button" disabled data-i18n="autoDetectAll">Auto Detect All</button>
          </div>
        </section>

        <section class="tool-section">
          <h2 data-i18n="groupBoxes">Boxes</h2>
          <div class="tool-actions">
            <button id="addBoxBtn" type="button" disabled data-i18n="addBox">Add Box</button>
            <button id="deleteBoxBtn" class="icon-button danger-button" type="button" disabled>
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4.5 7.5h15"></path>
                  <path d="M9.5 7.5V5.5h5v2"></path>
                  <path d="M8 7.5v10.5"></path>
                  <path d="M12 7.5v10.5"></path>
                  <path d="M16 7.5v10.5"></path>
                  <path d="M6 7.5l1 12h10l1-12"></path>
                </svg>
              </span>
              <span data-i18n="deleteBox">Clear Selected Box</span>
            </button>
            <button id="clearBoxesBtn" type="button" disabled data-i18n="clearBoxes">Clear All Boxes</button>
          </div>
          <div class="box-list" id="boxList"></div>
        </section>

        <section class="tool-section">
          <h2 data-i18n="groupExport">Export</h2>
          <div class="tool-actions">
            <button id="saveBtn" type="button" disabled data-i18n="saveCopy">Save Copy</button>
            <button id="saveAllBtn" type="button" disabled data-i18n="saveAll">Save All</button>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
