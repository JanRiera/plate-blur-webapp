<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Blur Prototype</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f4f4f5;
      color: #111827;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { font-size: 22px; margin: 0 0 16px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
    }
    button, input[type="range"], input[type="file"] {
      font: inherit;
    }
    button {
      border: 1px solid #d1d5db;
      background: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stage {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 14px;
    }
    .canvas-panel, .side-panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
    .canvas-wrap {
      overflow: auto;
      max-height: 78vh;
      border-radius: 10px;
      background: #fafafa;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 420px;
    }
    canvas {
      display: block;
      background: #f3f4f6;
      touch-action: none;
      max-width: none;
    }
    .side-panel h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #374151;
    }
    .muted { color: #6b7280; font-size: 13px; }
    .box-list {
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
      max-height: 240px;
      overflow: auto;
    }
    .box-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      background: #fafafa;
    }
    .selected { border-color: #2563eb; background: #eff6ff; }
    @media (max-width: 960px) {
      .stage { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Plate Blur Prototype</h1>
    <div class="toolbar">
      <input id="photoInput" type="file" accept="image/*" multiple />
      <button id="autoDetectBtn" disabled>Auto Detect</button>
      <button id="autoDetectAllBtn" disabled>Auto Detect All</button>
      <button id="addBoxBtn" disabled>Add Box</button>
      <button id="clearBoxesBtn" disabled>Clear All Boxes</button>      
      <button id="deleteBoxBtn" disabled>Clear Selected Box</button>
      <button id="saveBtn" disabled>Save Copy</button>
      <button id="saveAllBtn" disabled>Save All</button>
      <button id="prevBtn" disabled>Previous</button>
      <button id="nextBtn" disabled>Next</button>
      <button id="removePhotoBtn" disabled>Remove Photo</button>
      <span class="muted" id="status">Select a photo to begin.</span>
    </div>

    <div class="stage">
      <div class="canvas-panel">
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="editorCanvas" width="800" height="500"></canvas>
        </div>
      </div>

      <div class="side-panel">
        <h2>Adjustments</h2>
        <div class="field">

  <div class="field">
    <label for="redactionMode">Mode</label>
    <select id="redactionMode">
      <option value="blur" selected>Blur</option>
      <option value="amg">AMG Overlay</option>
    </select>
  </div>
          <label for="blurSlider">Blur strength</label>
          <input id="blurSlider" type="range" min="4" max="40" step="1" value="16" />
        </div>
        <div class="field">
          <label for="zoomSlider">Zoom</label>
          <input id="zoomSlider" type="range" min="25" max="200" step="5" value="100" />
        </div>
        <div class="field muted">
          Drag inside a box to move it. Drag the small square at bottom-right to resize it.
        </div>
        <div class="field muted">
          Auto-detect is only a rough prototype. Review every box before saving.
        </div>
        <div class="box-list" id="boxList"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
